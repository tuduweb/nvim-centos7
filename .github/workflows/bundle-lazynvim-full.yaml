name: Build Neovim CentOS7 Bundle

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-bundle:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. CentOS7 构建
      - name: Build Full Package in CentOS7
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work_dir" \
            -w /work_dir \
            centos:7 \
            /bin/bash -lc '
              set -euo pipefail

              echo "==== Fix YUM repo ===="
              rm -f /etc/yum.repos.d/*.repo
              cat > /etc/yum.repos.d/CentOS-Vault.repo <<EOF
          [base]
          name=CentOS-7.9.2009 - Base
          baseurl=http://vault.centos.org/7.9.2009/os/x86_64/
          enabled=1
          gpgcheck=0

          [updates]
          name=CentOS-7.9.2009 - Updates
          baseurl=http://vault.centos.org/7.9.2009/updates/x86_64/
          enabled=1
          gpgcheck=0

          [extras]
          name=CentOS-7.9.2009 - Extras
          baseurl=http://vault.centos.org/7.9.2009/extras/x86_64/
          enabled=1
          gpgcheck=0
          EOF

              yum clean all
              yum makecache fast

              echo "==== Install base deps ===="
              yum install -y \
                curl tar gzip xz unzip rsync \
                gcc gcc-c++ make findutils which \
                glibc libstdc++ ncurses-libs

              echo "==== Install Git 2.x (IUS) ===="
              yum install -y epel-release || true
              yum install -y https://repo.ius.io/ius-release-el7.rpm
              yum remove -y git || true
              yum install -y git224 git224-core git224-perl-Git || yum install -y git224

              ln -sf /usr/bin/git2.24 /usr/local/bin/git || true
              export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"

              git --version

              echo "==== Install Neovim ===="
              curl -L -o /tmp/nvim.tar.gz \
                https://github.com/neovim/neovim-releases/releases/download/v0.11.7/nvim-linux-x86_64.tar.gz

              tar xzf /tmp/nvim.tar.gz -C /opt
              export PATH="/opt/nvim-linux-x86_64/bin:$PATH"

              nvim --version

              echo "==== Setup XDG env ===="
              export HOME=/root
              export XDG_CONFIG_HOME="$HOME/.config"
              export XDG_DATA_HOME="$HOME/.local/share"
              export XDG_STATE_HOME="$HOME/.local/state"
              export XDG_CACHE_HOME="$HOME/.cache"

              mkdir -p "$XDG_CONFIG_HOME/nvim"

              echo "==== Copy config ===="
              rsync -a /work_dir/ "$XDG_CONFIG_HOME/nvim/" \
                --exclude ".git" \
                --exclude ".github" \
                --exclude "dist" \
                --exclude "nvim-linux-x86_64*" \
                --exclude "*.tar.gz"

              echo "==== Install plugins ===="
              export NVIM_LAZY_NO_FILTER=1
              git config --global protocol.version 2

              nvim --headless "+Lazy! sync" +qa

              echo "==== Build treesitter ===="
              nvim --headless "+TSUpdateSync" +qa || true

              echo "==== Package ===="
              mkdir -p /work_dir/dist
              cd "$HOME"

              tar -czf /work_dir/dist/lazynvim-centos7-bundle.tar.gz \
                .config/nvim \
                .local/share/nvim \
                .local/state/nvim \
                .cache/nvim

              ls -lh /work_dir/dist/
              echo "Build completed successfully."
            '

      # 3. 上传 Artifact（CI 下载用）
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lazynvim-centos7-bundle
          path: dist/lazynvim-centos7-bundle.tar.gz
          retention-days: 5

      # 4. 发布 Release（打 tag 时）
      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "LazyNvim CentOS7 bundle" \
            --repo "${GITHUB_REPOSITORY}" || true

          gh release upload "${GITHUB_REF_NAME}" \
            dist/lazynvim-centos7-bundle.tar.gz \
            --clobber \
            --repo "${GITHUB_REPOSITORY}"
