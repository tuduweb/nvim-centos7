name: Bundle Neovim for CentOS 7

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动触发

jobs:
  build-bundle:
    runs-on: ubuntu-latest
    steps:
      # 必须先检出代码，否则 /work_dir 里面是空的
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Full Package in CentOS7
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work_dir" \
            -w /work_dir \
            centos:7 \
            /bin/bash -lc '
              set -euo pipefail
              
              # (后面接你之前的脚本内容...)
              rm -f /etc/yum.repos.d/*.repo
              # ... 省略中间代码 ...
            '
